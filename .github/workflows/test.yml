name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smiirl
          POSTGRES_PASSWORD: smiirl_dev
          POSTGRES_DB: smiirl
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run schema
        run: |
          PGPASSWORD=smiirl_dev psql -h localhost -U smiirl -d smiirl -f db/schema.sql

      - name: Run tests
        env:
          NODE_ENV: test
          TEST_DATABASE_URL: postgres://smiirl:smiirl_dev@localhost:5432/smiirl
          JWT_SECRET: test_secret_for_ci
          DATABASE_URL: postgres://smiirl:smiirl_dev@localhost:5432/smiirl
        run: npm test
